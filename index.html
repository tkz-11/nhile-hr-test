function SubmitEvidenceModal({ useRealApi = false, role = 'hr_manager', onClose }) {
  const [proof, setProof] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const submit = async () => {
    setLoading(true);
    if (useRealApi) {
      try {
        const r = await apiFetch('/ai/score-evidence', {
          role, method: 'POST',
          body: { proof_text: proof, challenge_text: CHALLENGES.weekly.text, max_points: CHALLENGES.weekly.points },
        });
        setResult({
          approved: !!r.approved,
          awarded_points: r.awarded_points || 0,
          ai_feedback: r.ai_feedback || 'AI đã phản hồi.',
          ai_reason: r.ai_reason || '',
        });
      } catch (e) {
        setResult({ approved: false, awarded_points: 0, ai_feedback: `Lỗi gọi AI: ${e.message}`, ai_reason: 'Vui lòng thử lại sau.' });
      } finally {
        setLoading(false);
      }
      return;
    }
    // Fallback mock khi tắt API
    setTimeout(() => {
      setLoading(false);
      const approved = proof.length > 80;
      setResult({ approved, awarded_points: approved ? 50 : 0, ai_feedback: approved ? 'Bằng chứng rõ ràng và có hành động cụ thể. Xuất sắc!' : 'Cần mô tả hành động cụ thể hơn, có thể đo lường được.', ai_reason: approved ? 'Đạt tiêu chí hành động + kết quả' : 'Chưa có bằng chứng hành động cụ thể' });
    }, 900);
  };
  return (
    <Modal open onClose={onClose} title="Nộp bằng chứng" size="md">
      <div className="p-6 space-y-4">
        <div className="bg-[#F8F9FB] rounded-xl p-4 border border-[#EAECF0]">
          <p className="text-[13px] text-[#111827] leading-relaxed">{CHALLENGES.weekly.text}</p>
          <p className="text-[11px] font-medium text-[#4F46E5] mt-2 num-tab">+{CHALLENGES.weekly.points} điểm tối đa</p>
        </div>
        {!result ? (
          <React.Fragment>
            <textarea value={proof} onChange={e => setProof(e.target.value)} rows="5"
              className="w-full bg-[#F8F9FB] border border-[#EAECF0] rounded-xl p-4 text-[14px] resize-none focus:border-[#4F46E5]/40 outline-none placeholder-[#9CA3AF]"
              placeholder="Mô tả bằng chứng cụ thể: Bạn đã làm gì, với ai, kết quả ra sao (tối thiểu 80 ký tự)..." />
            <p className={`text-[13px] num-tab ${proof.length < 80 ? 'text-[#9CA3AF]' : 'text-[#059669]'}`}>{proof.length}/80 ký tự tối thiểu</p>
            <button onClick={submit} disabled={loading || proof.length < 20} className="w-full py-3 bg-[#C0392B] text-white font-medium text-[14px] rounded-xl hover:bg-[#a8331f] disabled:opacity-50 inline-flex items-center justify-center gap-2">
              {loading ? 'AI đang chấm điểm...' : 'Nộp & chấm điểm AI'}
              {useRealApi && <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-white/20 border border-white/30">Gemini</span>}
            </button>
          </React.Fragment>
        ) : (
          <div className="space-y-3">
            <div className={`${result.approved ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} border rounded-xl p-4`}>
              <div className="flex items-center justify-between mb-2">
                <Badge variant={result.approved ? 'ok' : 'high'}>{result.approved ? 'ĐƯỢC CHẤP NHẬN' : 'CHƯA ĐẠT'}</Badge>
                <span className="text-[14px] font-semibold font-header num-tab">+{result.awarded_points} điểm</span>
              </div>
              <p className="text-[13px] text-[#111827] leading-relaxed">{result.ai_feedback}</p>
              <p className="text-[13px] text-[#4B5563] italic mt-2">Lý do: {result.ai_reason}</p>
            </div>
            <button onClick={onClose} className="w-full py-3 bg-[#F4F5F8] text-[#4B5563] font-medium text-[14px] rounded-xl border border-[#EAECF0]">Đóng</button>
          </div>
        )}
      </div>
    </Modal>
  );
}

function KnowledgeBase({ user, extraStories = [], liveStories = null }) {
  const [search, setSearch] = useState('');
  const [expType, setExpType] = useState('');
  const [courage, setCourage] = useState('');
  const canSeeAll = user.primary_role === 'hr_manager' || user.primary_role === 'leader';
  const base = liveStories && liveStories.length ? liveStories : STORIES;
  const allStories = [...extraStories, ...base];
  const visible = allStories.filter(s => canSeeAll || s.is_public !== false);
  const filtered = visible.filter(s => {
    const matchSearch = !search || s.content.toLowerCase().includes(search.toLowerCase());
    const matchType = !expType || s.experience_type === expType;
    const matchCourage = !courage || s.courage_level === courage;
    return matchSearch && matchType && matchCourage;
  });

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl border border-[#EAECF0] p-4 shadow-card">
        <div className="flex flex-col sm:flex-row gap-3">
          <div className="flex-1 relative">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[#9CA3AF]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm kiếm bài học, từ khóa..."
              className="w-full bg-[#F8F9FB] border border-[#EAECF0] rounded-lg pl-9 pr-4 py-2.5 text-[14px] outline-none focus:border-[#4F46E5]/40 placeholder-[#9CA3AF]" />
          </div>
          <select value={expType} onChange={e => setExpType(e.target.value)} className="bg-[#F8F9FB] border border-[#EAECF0] rounded-lg px-3 py-2.5 text-[14px] text-[#4B5563] outline-none">
            <option value="">Tất cả loại</option>
            {Object.entries(EXP_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
          </select>
          <select value={courage} onChange={e => setCourage(e.target.value)} className="bg-[#F8F9FB] border border-[#EAECF0] rounded-lg px-3 py-2.5 text-[14px] text-[#4B5563] outline-none">
            <option value="">Tất cả mức</option>
            {Object.entries(COURAGE_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        {!canSeeAll && <p className="text-[13px] text-[#9CA3AF] mt-2.5">Hiển thị bài học được công khai. HR & Leader thấy tất cả.</p>}
      </div>

      {filtered.length === 0 ? (
        <EmptyState title="Không tìm thấy bài học" description="Hãy thử từ khóa khác hoặc xóa bộ lọc." />
      ) : (
        <div className="space-y-3">
          {filtered.map(s => (
            <div key={s.id} className="bg-white rounded-xl border border-[#EAECF0] p-5 shadow-card hover:shadow-card-hover transition-all">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <Badge variant="ok">{EXP_LABELS[s.experience_type]}</Badge>
                <Badge variant="neutral">{COURAGE_LABELS[s.courage_level]}</Badge>
                {!s.is_public && <Badge variant="high">Nội bộ</Badge>}
              </div>
              <p className="text-[14px] text-[#111827] leading-relaxed line-clamp-3">{s.content}</p>
              <p className="text-[13px] text-[#9CA3AF] mt-2">{s.user.name} · {new Date(s.created_at).toLocaleDateString('vi-VN')}</p>

  );
}

function TeamHealthTab({ useRealApi = false, role = 'hr_manager' }) {
  const [analyzing, setAnalyzing] = useState(null);
  const [aiResults, setAiResults] = useState({}); // { team_id: { insights, patterns, recommendations } }
  const runAnalyze = async (team) => {
    setAnalyzing(team.team_id);
    if (useRealApi) {
      try {
        const r = await apiFetch('/ai/team-health', {
          role, method: 'POST',
          body: {
            team_id: team.team_id,
            team_name: team.team_name,
            member_count: team.member_count,
            health_index: team.health_index,
            support_rate: team.support_rate,
            avg_scores: team.avg_scores_json,
          },
        });
        setAiResults(prev => ({
          ...prev,
          [team.team_id]: {
            insights: r.insights || 'AI không trả lời được.',
            patterns: Array.isArray(r.patterns) ? r.patterns : [],
            recommendations: Array.isArray(r.recommendations) ? r.recommendations : [],
          },
        }));
      } catch (e) {
        setAiResults(prev => ({
          ...prev,
          [team.team_id]: { insights: `Lỗi AI: ${e.message}`, patterns: [], recommendations: [] },
        }));
      } finally {
        setAnalyzing(null);
      }
      return;
    }
    // Fallback mock
    setTimeout(() => {
      setAnalyzing(null);
      setAiResults(prev => ({
        ...prev,
        [team.team_id]: {
          insights: 'Team đang có xu hướng giao tiếp cải thiện rõ rệt trong tháng qua. Tuy nhiên, tỷ lệ chia sẻ câu chuyện công khai vẫn còn thấp so với mục tiêu.',
          patterns: ['Thành viên mới (< 3 tháng) có xu hướng im lặng hơn khi gặp khó khăn','Leader có số lần feedback đúng hạn cao → team có điểm giao tiếp tốt hơn','Thử thách tuần được hoàn thành chủ yếu bởi nhóm senior'],
          recommendations: ['Tổ chức 1-on-1 định kỳ với thành viên < 3 tháng','Nhân rộng mô hình leader phản hồi đúng hạn ra toàn team','Thiết kế thử thách daily dễ hơn để tăng participation rate'],
        },
      }));
    }, 1600);
  };

  return (
    <div className="space-y-4">
      {TEAM_HEALTH.map(t => (
        <div key={t.team_id} className="bg-white rounded-xl border border-[#EAECF0] p-6 shadow-card hover:shadow-card-hover transition-all">
          <div className="flex justify-between items-start mb-4">
            <div>
              <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.1em] mb-1">Team</p>
              <h3 className="text-[16px] font-semibold text-[#111827] font-header">{t.team_name}</h3>
              <p className="text-[13px] text-[#9CA3AF] mt-0.5">Quy mô: <span className="num-tab">{t.member_count}</span> nhân sự · Hỗ trợ: <span className="num-tab">{t.support_rate}%</span></p>
            </div>
            <Badge variant={t.health_index >= 70 ? 'ok' : t.health_index >= 50 ? 'medium' : 'high'}>Sức khỏe: <span className="num-tab ml-1">{t.health_index}/100</span></Badge>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-3">
            <MiniBar label="Dám làm" value={t.avg_scores_json.try} color="#DC2626" />
            <MiniBar label="Chia sẻ" value={t.avg_scores_json.share} color="#D97706" />
            <MiniBar label="Học hỏi" value={t.avg_scores_json.learn} color="#4F46E5" />
            <MiniBar label="Hỗ trợ"  value={t.avg_scores_json.help}  color="#059669" />
          </div>
          {t.avg_scores_json.insights && (<p className="text-[14px] text-[#4B5563] italic bg-[#F8F9FB] p-4 rounded-lg border border-[#EAECF0] mb-3 leading-relaxed">"{t.avg_scores_json.insights}"</p>)}
          <button onClick={() => runAnalyze(t)} disabled={analyzing === t.team_id} className="px-4 py-2 border border-[#EAECF0] text-[#4B5563] font-medium rounded-lg text-[13px] hover:bg-[#F8F9FB] disabled:opacity-60 inline-flex items-center gap-2">
            {analyzing === t.team_id ? 'Đang phân tích AI...' : (aiResults[t.team_id] ? 'Phân tích lại' : 'Phân tích AI chi tiết')}
            {useRealApi && <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-indigo-50 border border-indigo-200 text-indigo-700">Gemini</span>}
          </button>

          {aiResults[t.team_id] && (
            <div className="mt-4 bg-indigo-50 border border-indigo-200 rounded-xl p-5 animate-slide-up">
              <p className="text-[11px] font-medium text-[#4F46E5] uppercase tracking-[0.1em] mb-2">AI Insights</p>
              <p className="text-[14px] text-[#111827] italic leading-relaxed mb-4">"{aiResults[t.team_id].insights}"</p>
              {aiResults[t.team_id].patterns.length > 0 && (
                <div className="mb-4">
                  <p className="text-[13px] font-medium text-[#4F46E5] mb-2">Patterns phát hiện:</p>
                  <ul className="space-y-1.5">
                    {aiResults[t.team_id].patterns.map((p, i) => <li key={i} className="text-[13px] text-[#4B5563] flex gap-2"><span className="text-[#4F46E5]">•</span>{p}</li>)}
                  </ul>
                </div>
              )}
              {aiResults[t.team_id].recommendations.length > 0 && (
                <div>
                  <p className="text-[13px] font-medium text-[#4F46E5] mb-2">Khuyến nghị:</p>
                  <ul className="space-y-1.5">
                    {aiResults[t.team_id].recommendations.map((r, i) => <li key={i} className="text-[13px] text-[#4B5563] flex gap-2"><span className="text-[#059669]">→</span>{r}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function applyTokens(mood, density, numerics, sidebarTheme = 'light') {
  const m = MOOD_PRESETS[mood] || MOOD_PRESETS.editorial;
  const d = DENSITY_PRESETS[density] || DENSITY_PRESETS.comfortable;
  const n = NUMERICS_PRESETS[numerics] || NUMERICS_PRESETS.tabular;
  const sb = SIDEBAR_THEMES[sidebarTheme] || SIDEBAR_THEMES.light;
  const root = document.documentElement;
  const v = {
    '--nl-bg': m.bg, '--nl-surface': m.surface, '--nl-surface-alt': m.surfaceAlt,
    '--nl-text': m.text, '--nl-text-2': m.text2, '--nl-muted': m.muted, '--nl-border': m.borderL,
    '--nl-brand': m.brand, '--nl-accent': m.accent, '--nl-danger': m.danger, '--nl-warn': m.warn, '--nl-ok': m.ok,
    '--nl-radius-sm': m.radiusSm + 'px', '--nl-radius': m.radius + 'px', '--nl-radius-lg': m.radiusLg + 'px',
    '--nl-hero-bg': m.heroBg, '--nl-metric-bg': m.metricBg,
    '--nl-head-font': m.headFont, '--nl-body-font': m.bodyFont,
    '--nl-scale': d.scale, '--nl-pad-card': d.padCard + 'px', '--nl-pad-section': d.padSection + 'px',
    '--nl-sidebar': d.sidebar + 'px', '--nl-topbar': d.topbar + 'px',
    '--nl-num-font': n.font, '--nl-num-feature': n.feature, '--nl-num-weight': n.weight,
    '--nl-num-scale': n.scale, '--nl-num-letter': n.letter,
    // Sidebar theme tokens
    '--nl-sb-bg': sb.bg, '--nl-sb-text': sb.text, '--nl-sb-muted': sb.muted,
    '--nl-sb-border': sb.border, '--nl-sb-hover': sb.hover,
    '--nl-sb-active-text': sb.activeText, '--nl-sb-active-border': sb.activeBorder,
    '--nl-sb-brand-bg': sb.brandBg, '--nl-sb-brand-text': sb.brandText,
    // Pastels
    '--nl-pastel-peach-bg': PASTEL.peach.bg,       '--nl-pastel-peach-text': PASTEL.peach.text,
    '--nl-pastel-sage-bg': PASTEL.sage.bg,         '--nl-pastel-sage-text': PASTEL.sage.text,
    '--nl-pastel-sky-bg': PASTEL.sky.bg,           '--nl-pastel-sky-text': PASTEL.sky.text,
    '--nl-pastel-lavender-bg': PASTEL.lavender.bg, '--nl-pastel-lavender-text': PASTEL.lavender.text,
    '--nl-pastel-rose-bg': PASTEL.rose.bg,         '--nl-pastel-rose-text': PASTEL.rose.text,
  };
  Object.entries(v).forEach(([k, val]) => root.style.setProperty(k, val));
  document.body.style.background = m.bg;
  document.body.style.color = m.text;
  document.body.style.fontFamily = m.bodyFont;
}

          {page === 'passport' && <PassportPage user={user} useRealApi={t.useRealApi} role={role} />}
          {page === 'culture' && <CulturePage user={user} useRealApi={t.useRealApi} role={role} />}
        </main>
      </div>
      <NBotCoach user={user} page={page} />
      {PanelOK && (
        <TweaksPanel>
          <TweakSection label="Aesthetic mood" />
          <TweakRadio
            label="Mood"
            value={t.mood}
            options={[
              { value: 'editorial', label: 'Editorial' },
              { value: 'clinical', label: 'Clinical' },
              { value: 'vibrant', label: 'Vibrant' },
            ]}
            onChange={(v) => setTweak('mood', v)}
          />
          <TweakSection label="Density" />
          <TweakRadio
            label="Spacing"
            value={t.density}
            options={[
              { value: 'compact', label: 'Compact' },
              { value: 'comfortable', label: 'Comfy' },
              { value: 'spacious', label: 'Spacious' },
            ]}
            onChange={(v) => setTweak('density', v)}
          />
          <TweakSection label="Numerics" />
          <TweakRadio
            label="Style"
            value={t.numerics}
            options={[
              { value: 'plain', label: 'Plain' },
              { value: 'tabular', label: 'Tabular' },
              { value: 'monoXL', label: 'Mono XL' },
            ]}
            onChange={(v) => setTweak('numerics', v)}
          />
          <TweakSection label="Backend Config" />
          <TweakToggle
            label="Connect to API"
            value={t.useRealApi}
            onChange={(v) => setTweak('useRealApi', v)}
          />
        </TweaksPanel>
      )}
    </div>
  );
}

function App() {
  const { session, profile, loading } = useAuth();
  if (loading) return <SplashLoader />;
  if (!session || !profile) return <LoginPage />;
  return <MainApp user={profile} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><App /></AuthProvider>
);

</script>
</body>
</html>
