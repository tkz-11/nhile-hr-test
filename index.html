function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        title="Mở bảng Tweaks"
        style={{
          position: 'fixed', right: 16, bottom: 80, zIndex: 2147483646,
          width: 44, height: 44, borderRadius: 22, border: 'none',
          background: '#111827', color: '#fff',
          boxShadow: '0 4px 14px rgba(0,0,0,.25)',
          cursor: 'pointer', fontSize: 18, lineHeight: 1,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}
      >⚙</button>
    );
  }
  return (
    <React.Fragment>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </React.Fragment>
  );
}

function TweakSection({ label, children }) {
  return (
    <React.Fragment>
      <div className="twk-sect">{label}</div>
      {children}
    </React.Fragment>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaW1lemV5cmxscGp3Z2F3Z2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTkwOTcsImV4cCI6MjA5MzI3NTA5N30.qFMPvK1Q6kOJ0XSuS4D78si4akadmPrMSkHFKppnTZg";

/** Helper gọi API: lấy access_token live từ Supabase mỗi call để tránh stale.
 *  Auto signOut khi 401 — onAuthStateChange sẽ tự đẩy về LoginPage.
 *  Param `role` (nếu truyền) sẽ bị ignore — backend lấy role từ JWT/DB. */
async function apiFetch(path, { method = 'GET', body, role: _ignored } = {}) {
  const { data: { session } } = await sb.auth.getSession();
  const headers = {};
  if (session?.access_token) headers['Authorization'] = `Bearer ${session.access_token}`;
  if (body !== undefined) headers['Content-Type'] = 'application/json';

  const res = await fetch(`${API_BASE}${path}`, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });

  if (res.status === 401) {
    // Token hết hạn / bị revoke / tampered → kéo session về 0,
    // AuthProvider sẽ render LoginPage qua onAuthStateChange.
    await sb.auth.signOut();
    const err = new Error('Phiên đăng nhập đã hết hạn');
    err.status = 401;
    throw err;
  }

  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const err = new Error(data?.detail || `HTTP ${res.status}`);
    err.status = res.status; err.data = data;
    throw err;
  }
  return data;
}

/* AUTH CONTEXT — provider gắn ở root, useAuth() để lấy session/profile/login/logout */
const AuthContext = React.createContext(null);

// Cache profile trong localStorage để tab reload / token refresh không phải splash lại.
// Linear/Notion style: token refresh là silent — không flash UI.
const PROFILE_CACHE_KEY = 'nhile_profile_v1';

function readCachedProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_CACHE_KEY) || 'null'); }
  catch { return null; }
}

function AuthProvider({ children }) {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(readCachedProfile);
  // Nếu đã có profile cache → render ngay, không splash. Chỉ splash khi mount lần đầu chưa có cache.
  const [loading, setLoading] = useState(() => readCachedProfile() === null);
  const lastLoadedUserIdRef = useRef(profile?.id || null);

  async function loadProfile(token, { silent = false } = {}) {
    if (!silent) setLoading(true);
    try {
      const r = await fetch(`${API_BASE}/auth/me`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!r.ok) {
        if (r.status === 401) {
          localStorage.removeItem(PROFILE_CACHE_KEY);
          setProfile(null);
          lastLoadedUserIdRef.current = null;
          await sb.auth.signOut();
        }
        return;
      }
      const p = await r.json();
      setProfile(p);
      lastLoadedUserIdRef.current = p?.id || null;
      try { localStorage.setItem(PROFILE_CACHE_KEY, JSON.stringify(p)); } catch {}
    } catch (e) {
      console.error('[Auth] loadProfile failed', e);
      // Giữ cache cũ — đừng kick user về login chỉ vì network blip.
    } finally {
      if (!silent) setLoading(false);
    }
  }

  useEffect(() => {
    let mounted = true;
    sb.auth.getSession().then(({ data }) => {
      if (!mounted) return;
      setSession(data.session);
      if (data.session) {
        // Có cache + cùng user → revalidate ngầm. Không cache → splash.
        const cached = readCachedProfile();
        const sameUser = cached && cached.id === data.session.user.id;
        loadProfile(data.session.access_token, { silent: sameUser });
        if (sameUser) setLoading(false);
      } else {
        localStorage.removeItem(PROFILE_CACHE_KEY);
        setLoading(false);
      }
    });

    const { data: sub } = sb.auth.onAuthStateChange((event, s) => {
      if (!mounted) return;
      setSession(s);

      // SIGNED_OUT → clear hết
      if (event === 'SIGNED_OUT' || !s) {
        localStorage.removeItem(PROFILE_CACHE_KEY);
        setProfile(null);
        lastLoadedUserIdRef.current = null;
        setLoading(false);
        return;
      }

      // INITIAL_SESSION → đã handle ở getSession() trên
      if (event === 'INITIAL_SESSION') return;

      // SIGNED_IN với user khác → splash + reload profile
      if (event === 'SIGNED_IN' && s.user.id !== lastLoadedUserIdRef.current) {
        loadProfile(s.access_token);
        return;
      }

      // TOKEN_REFRESHED, USER_UPDATED, SIGNED_IN-cùng-user (focus tab, etc.)
      // → revalidate silent, không flash UI.
      loadProfile(s.access_token, { silent: true });
    });
    return () => { mounted = false; sub.subscription.unsubscribe(); };
  }, []);

  const value = {
    session, profile, loading,
    login: (email, password) => sb.auth.signInWithPassword({ email, password }),
    logout: () => sb.auth.signOut(),
  };
  return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
}
const useAuth = () => React.useContext(AuthContext);

/* LOGIN PAGE — card center, brand đỏ, error toast generic */
function LoginPage() {
  const { login } = useAuth();
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  async function onSubmit(e) {
    e.preventDefault();
    if (submitting) return;
    setError('');
    setSubmitting(true);
    try {
      const { error: err } = await login(email.trim(), password);
      if (err) {
        // Generic message — không reveal email tồn tại hay không
        setError('Email hoặc mật khẩu không đúng');
      }
      // Nếu OK, onAuthStateChange sẽ tự đẩy sang MainApp — không cần làm gì.
    } catch (_e) {
      setError('Email hoặc mật khẩu không đúng');
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-4"
         style={{ background: 'linear-gradient(135deg, #FAFAF9 0%, #F4F5F8 50%, #F1E8E5 100%)' }}>
      <div className="w-full max-w-[420px]">
        <div className="rounded-2xl bg-white/90 backdrop-blur-md border border-[#EAECF0] shadow-[0_20px_48px_rgba(0,0,0,0.08)] p-8">
          {/* Logo + tagline */}
          <div className="flex flex-col items-center mb-6">
            <div className="w-12 h-12 rounded-2xl bg-[#C0392B] text-white flex items-center justify-center font-header font-semibold text-[18px] mb-3">
              N
            </div>
            <h1 className="font-header text-[20px] font-semibold text-[#0A0A0A]">NhiLe HR</h1>
            <p className="text-[13px] text-[#6B7280] mt-1">Hộ chiếu văn hóa NhiLe Team</p>
          </div>

          <form onSubmit={onSubmit} className="space-y-4">
            <div>
              <label className="block text-[12px] font-medium text-[#374151] mb-1.5">Email</label>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                required
                autoFocus
                autoComplete="email"
                placeholder="ten@nhile.local"
                className="w-full px-3.5 py-2.5 rounded-lg border border-[#EAECF0] text-[14px] focus:outline-none focus:border-[#C0392B] focus:ring-2 focus:ring-[#C0392B]/10 transition"
              />
            </div>
            <div>
              <label className="block text-[12px] font-medium text-[#374151] mb-1.5">Mật khẩu</label>
              <input
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                required
                autoComplete="current-password"
                className="w-full px-3.5 py-2.5 rounded-lg border border-[#EAECF0] text-[14px] focus:outline-none focus:border-[#C0392B] focus:ring-2 focus:ring-[#C0392B]/10 transition"
              />
            </div>

            {error && (
              <div className="px-3 py-2 rounded-lg bg-[#FEF2F2] border border-[#FECACA] text-[13px] text-[#B91C1C]">
                {error}
              </div>
            )}

            <button
              type="submit"
              disabled={submitting || !email || !password}
              className="w-full py-2.5 rounded-lg bg-[#C0392B] text-white font-medium text-[14px] hover:bg-[#A93226] disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center gap-2"
            >
              {submitting && (
                <span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
              )}
              {submitting ? 'Đang đăng nhập…' : 'Đăng nhập'}
            </button>
          </form>

          <p className="text-center text-[12px] text-[#9CA3AF] mt-6">
            Chưa có tài khoản? Liên hệ <span className="text-[#C0392B] font-medium">HR Manager</span>
          </p>
        </div>
      </div>
    </div>
  );
}

/* HOOKS */
function useCountUp(target, duration = 800) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    let raf = 0, start = null;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min((t - start) / duration, 1);
      setValue(Math.round(target * p));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return value;
}

function RadarChart({ labels, data, color = '#4F46E5', max = 10, size = 240, benchmark = null, centerScore = null, centerLabel = '' }) {
  const cx = size/2, cy = size/2, R = size*0.36;
  const n = labels.length;
  const angle = (i) => -Math.PI/2 + (2*Math.PI*i)/n;
  const point = (v, i) => { const r = (v/max) * R; return [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))]; };
  const rings = [0.25, 0.5, 0.75, 1];
  const polyForRing = (ratio) => labels.map((_, i) => { const r = R * ratio; return `${cx + r*Math.cos(angle(i))},${cy + r*Math.sin(angle(i))}`; }).join(' ');
  const dataPoly = data.map((v, i) => point(v, i).join(',')).join(' ');
  const benchPoly = benchmark != null ? labels.map((_, i) => { const r = R * (benchmark / max); return `${cx + r*Math.cos(angle(i))},${cy + r*Math.sin(angle(i))}`; }).join(' ') : null;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height="100%" style={{ maxHeight: '100%' }}>
      {rings.map((r, k) => (<polygon key={k} points={polyForRing(r)} fill="none" stroke="#F1F5F9" strokeWidth="1" />))}
      {labels.map((_, i) => { const [x, y] = point(max, i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#F1F5F9" strokeWidth="1" />; })}
      {benchPoly && <polygon points={benchPoly} fill="none" stroke="#9CA3AF" strokeWidth="1.2" strokeDasharray="3 3" />}
      <polygon points={dataPoly} fill={color} fillOpacity="0.14" stroke={color} strokeWidth="2" strokeLinejoin="round" />
      {data.map((v, i) => { const [x, y] = point(v, i); return <circle key={i} cx={x} cy={y} r="3" fill="#fff" stroke={color} strokeWidth="2" />; })}
      {labels.map((lb, i) => {
        const [x, y] = point(max * 1.22, i);
        return (<text key={i} x={x} y={y} fontSize="10.5" fontWeight="500" fontFamily="Be Vietnam Pro" fill="#6B7280" textAnchor="middle" dominantBaseline="middle">{lb}</text>);
      })}
      {centerScore != null && (
        <g>
          <text x={cx} y={cy - 4} fontSize="28" fontWeight="600" fontFamily="Lexend" fill="#111827" textAnchor="middle" dominantBaseline="middle" style={{ fontVariantNumeric: 'tabular-nums' }}>{centerScore}</text>
          {centerLabel && <text x={cx} y={cy + 16} fontSize="9" fontWeight="500" fontFamily="Be Vietnam Pro" fill="#9CA3AF" textAnchor="middle" letterSpacing="1">{centerLabel}</text>}
        </g>
      )}
    </svg>
  );
}

function LineChart({ labels, data, color = '#059669', max = 10, fill = true }) {
  const W = 300, H = 110, padL = 14, padR = 14, padT = 10, padB = 22;
  const cw = W - padL - padR, ch = H - padT - padB;
  const xAt = (i) => padL + (i/(labels.length-1)) * cw;
  const yAt = (v) => padT + (1 - v/max) * ch;
  const line = data.map((v, i) => `${i===0?'M':'L'}${xAt(i)},${yAt(v)}`).join(' ');
  const area = `${line} L${xAt(data.length-1)},${padT+ch} L${xAt(0)},${padT+ch} Z`;
  const gradId = `g${color.replace('#','')}`;
  const lastIdx = data.length - 1;
  const lastX = xAt(lastIdx), lastY = yAt(data[lastIdx]);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((r, i) => (<line key={i} x1={padL} x2={W-padR} y1={padT + ch*r} y2={padT + ch*r} stroke="#F3F4F6" strokeWidth="1" />))}
      {fill && <path d={area} fill={`url(#${gradId})`} />}
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((v, i) => (<circle key={i} cx={xAt(i)} cy={yAt(v)} r="2" fill={color} />))}
      <circle cx={lastX} cy={lastY} r="4" fill={color} stroke="#fff" strokeWidth="2" />
      <text x={lastX} y={lastY - 8} fontSize="11" fontWeight="500" fill={color} textAnchor="middle" fontFamily="Be Vietnam Pro" className="num-tab">{data[lastIdx]}</text>
      {labels.map((lb, i) => (<text key={i} x={xAt(i)} y={H-6} fontSize="11" fill="#9CA3AF" textAnchor="middle" fontFamily="Be Vietnam Pro">{lb}</text>))}
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────────────
// Sparkline — minimal line chart không axis (Stripe/Linear pattern).
// Dùng trong KPI card để show xu hướng compact.
// ─────────────────────────────────────────────────────────────────────
function Sparkline({ data, color = '#4F46E5', height = 32, width = 110, fill = true }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const padY = 3;
  const xAt = (i) => (i / (data.length - 1)) * width;
  const yAt = (v) => padY + (1 - (v - min) / range) * (height - padY * 2);
  const line = data.map((v, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
  const area = `${line} L${xAt(data.length - 1).toFixed(1)},${height} L0,${height} Z`;
  const gradId = `spark-${color.replace('#', '')}-${Math.random().toString(36).slice(2, 7)}`;
  const lastX = xAt(data.length - 1), lastY = yAt(data[data.length - 1]);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.16" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && <path d={area} fill={`url(#${gradId})`} />}
      <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={lastX} cy={lastY} r="2.5" fill={color} stroke="#fff" strokeWidth="1.5" />
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────────────
// KPICard — Stripe/Vercel pattern: eyebrow / value / delta / sparkline.
// 4 tiers of info compact trong ~88px height.
// ─────────────────────────────────────────────────────────────────────
function KPICard({ label, value, suffix, delta, deltaPositive, sparklineData, accentColor = '#4F46E5', helper }) {
  const deltaColor = deltaPositive == null ? '#9CA3AF' : (deltaPositive ? '#059669' : '#DC2626');
  const arrow = deltaPositive == null ? '' : (deltaPositive ? '▲' : '▼');
  return (
    <div className="bg-white rounded-xl border border-[#EAECF0] p-5 shadow-card">
      <div className="flex items-start justify-between gap-4">
        <div className="flex-1 min-w-0">
          <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.1em] mb-2">{label}</p>
          <div className="flex items-baseline gap-1.5">
            <span className="text-[32px] font-semibold font-header text-[#111827] num-tab leading-none">{value}</span>
            {suffix && <span className="text-[13px] text-[#9CA3AF] font-medium">{suffix}</span>}
          </div>
          {(delta || helper) && (
            <div className="flex items-center gap-2 mt-2">
              {delta && (
                <span className="text-[13px] font-medium num-tab inline-flex items-center gap-1" style={{ color: deltaColor }}>
                  {arrow && <span className="text-[8px]">{arrow}</span>}{delta}
                </span>
              )}
              {helper && <span className="text-[13px] text-[#9CA3AF]">{helper}</span>}
            </div>
          )}
        </div>
        {sparklineData && sparklineData.length >= 2 && (
          <div className="flex-shrink-0 -mr-1">
            <Sparkline data={sparklineData} color={accentColor} height={40} width={88} />
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// DualRing — concentric rings cho MirrorView (Apple Activity pattern).
// Inner ring: leader. Outer ring: team. Gap show trực quan.
// ─────────────────────────────────────────────────────────────────────
function DualRing({ leaderScore, teamScore, leaderColor = '#4F46E5', teamColor = '#059669', size = 220 }) {
  const cx = size / 2, cy = size / 2;
  const rOuter = size * 0.42, rInner = size * 0.30;
  const C_OUT = 2 * Math.PI * rOuter, C_IN = 2 * Math.PI * rInner;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} className="-rotate-90">
      {/* Track */}
      <circle cx={cx} cy={cy} r={rOuter} fill="none" stroke="#F4F5F8" strokeWidth="14" />
      <circle cx={cx} cy={cy} r={rInner} fill="none" stroke="#F4F5F8" strokeWidth="14" />
      {/* Team — outer ring */}
      <circle cx={cx} cy={cy} r={rOuter} fill="none" stroke={teamColor} strokeWidth="14"
        strokeDasharray={`${(teamScore / 100) * C_OUT} ${C_OUT}`} strokeLinecap="round" />
      {/* Leader — inner ring */}
      <circle cx={cx} cy={cy} r={rInner} fill="none" stroke={leaderColor} strokeWidth="14"
        strokeDasharray={`${(leaderScore / 100) * C_IN} ${C_IN}`} strokeLinecap="round" />
    </svg>
  );
}

/* HEATMAP */
function CultureHeatmap({ streakDays = 7 }) {
  const data = useMemo(() => {
    const days = [];
    const today = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const dd = String(d.getDate()).padStart(2,'0');
      days.push({ date: dd, deadline: Math.random() > 0.2 ? 1 : 0, wyfls: Math.random() > 0.3 ? 1 : 0, banned_words: Math.random() > 0.8 ? 1 : 0, direct_score: Math.floor(Math.random() * 6) });
    }
    return days;
  }, []);

  const rows = [
    { key: 'deadline', label: 'Tuân thủ deadline', getScore: d => d.deadline, getColor: s => s ? '#059669' : '#F4F5F8', getLabel: s => s ? 'Đúng hạn' : 'Trễ hạn' },
    { key: 'wyfls', label: 'Check-in WYFLS', getScore: d => d.wyfls, getColor: s => s ? '#4F46E5' : '#F4F5F8', getLabel: s => s ? 'Đã check-in' : 'Bỏ qua' },
    { key: 'banned', label: 'Ngôn ngữ sạch', getScore: d => d.banned_words ? 0 : 1, getColor: s => s ? '#111827' : '#FEF2F2', getLabel: s => s ? 'Ngôn ngữ sạch' : 'Có từ cấm' },
    { key: 'direct', label: 'Giao tiếp thẳng', getScore: d => d.direct_score, getColor: s => ['#F8F9FB','#E0E7FF','#C7D2FE','#A5B4FC','#818CF8','#4F46E5'][Math.max(0, Math.min(5, s))], getLabel: s => s === 0 ? 'Chưa đạt' : `Mức ${s}/5` },
  ];

  const last7 = data.slice(-7);
  const deadlineRate = Math.round((last7.filter(d => d.deadline).length / 7) * 100);
  const directAvg = Math.round(last7.reduce((s, d) => s + d.direct_score, 0) / 7 * 20);
  const bannedCount = data.filter(d => d.banned_words).length;

  return (
    <div className="bg-white rounded-xl border border-[#EAECF0] p-6 shadow-card">
      <div className="flex items-start justify-between mb-5">
        <div>
          <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.1em] mb-1.5">14 NGÀY GẦN NHẤT</p>
          <h3 className="text-[16px] font-semibold text-[#111827] font-header">Bản đồ nhiệt văn hóa</h3>
        </div>
        <div className="inline-flex items-center gap-2 px-2.5 py-1 rounded-md bg-green-50 border border-green-100">
          <div className="w-1.5 h-1.5 rounded-full bg-[#059669]"></div>
          <p className="text-[13px] font-medium text-green-800 num-tab">{streakDays} ngày streak</p>
        </div>
      </div>

      <div className="overflow-x-auto">
        <div style={{ minWidth: 640 }}>
          <div className="grid mb-2" style={{ gridTemplateColumns: '140px repeat(14, minmax(0, 1fr))', gap: '3px' }}>
            <div />
            {data.map((d, i) => (<div key={i} className="text-[11px] text-center font-medium text-[#9CA3AF] num-tab">{d.date}</div>))}
          </div>
          <div className="space-y-1">
            {rows.map(row => (
              <div key={row.key} className="grid items-center" style={{ gridTemplateColumns: '140px repeat(14, minmax(0, 1fr))', gap: '3px' }}>
                <p className="text-[13px] font-medium text-[#4B5563]">{row.label}</p>
                {data.map((day, i) => {
                  const s = row.getScore(day);
                  return (<div key={i} title={`${day.date} · ${row.getLabel(s)}`} className="aspect-square rounded-[3px] hover:scale-[1.18] hover:ring-2 hover:ring-offset-1 hover:ring-[#4F46E5]/30 transition-all cursor-pointer" style={{ backgroundColor: row.getColor(s) }} />);
                })}
              </div>
            ))}
          </div>
          {/* Legend — GitHub-style intensity scale */}
          <div className="flex items-center justify-end gap-1.5 mt-4 text-[11px] text-[#9CA3AF] font-medium">
            <span>Ít</span>
            {['#F8F9FB','#E0E7FF','#C7D2FE','#A5B4FC','#818CF8','#4F46E5'].map((c, i) => (
              <span key={i} className="w-3 h-3 rounded-[3px]" style={{ background: c }}></span>
            ))}
            <span>Nhiều</span>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-3 mt-5 pt-5 border-t border-[#EAECF0]">
        {[
          { value: `${deadlineRate}%`, label: 'Deadline 7 ngày',  color: '#059669' },
          { value: directAvg,           label: 'Directness TB',     color: '#4F46E5' },
          { value: bannedCount,         label: 'Từ cấm 14 ngày',    color: bannedCount > 0 ? '#DC2626' : '#059669' },
        ].map((s, i) => (
          <div key={i} className="text-center">
            <p className="text-[26px] font-semibold font-header num-tab leading-none" style={{ color: s.color }}>{s.value}</p>
            <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.08em] mt-1.5">{s.label}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function UserMenu({ user }) {
  const { logout } = useAuth();
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  // Đóng menu khi click ra ngoài
  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const initials = (user.full_name || user.email || '?')
    .split(/\s+/).map(s => s[0]).filter(Boolean).slice(-2).join('').toUpperCase();
  const avatarBg = user.primary_role === 'hr_manager' ? '#C0392B'
    : user.primary_role === 'leader' ? '#1F2937' : '#525252';

  return (
    <div ref={ref} className="relative">
      <button
        onClick={() => setOpen(o => !o)}
        className="w-9 h-9 rounded-full flex items-center justify-center text-white font-semibold text-[12px] hover:ring-2 hover:ring-black/10 transition"
        style={{ background: avatarBg }}
        aria-label="Tài khoản"
      >
        {initials}
      </button>
      {open && (
        <div className="absolute right-0 top-[44px] w-[260px] bg-white border border-[#EAECF0] rounded-xl shadow-[0_12px_32px_rgba(0,0,0,0.10)] py-1.5 z-50">
          <div className="px-3.5 py-2.5 border-b border-[#F3F4F6]">
            <p className="text-[13px] font-semibold text-[#0A0A0A] truncate">{user.full_name || '—'}</p>
            <p className="text-[11px] text-[#9CA3AF] truncate mt-0.5">{user.email}</p>
            <span className="inline-block mt-1.5 px-1.5 py-0.5 rounded text-[10px] font-medium uppercase tracking-wider"
                  style={{ background: avatarBg + '14', color: avatarBg }}>
              {ROLE_LABELS[user.primary_role] || user.primary_role}
            </span>
          </div>
          <button
            onClick={async () => { setOpen(false); await logout(); }}
            className="w-full px-3.5 py-2 text-left text-[13px] text-[#374151] hover:bg-[#F9FAFB] font-medium"
          >
            Đăng xuất
          </button>
        </div>
      )}
    </div>
  );
}

function MiniRewrite() {
  const [text, setText] = useState('');
  const suggestion = (() => {
    const lo = text.toLowerCase();
    const k = Object.keys(REWRITE_HINTS).find(x => lo.includes(x));
    return k ? REWRITE_HINTS[k] : null;
  })();
  return (
    <div className="bg-[#FAFAF7] rounded-xl p-4 border border-black/5">
      <CardHeader eyebrow="REALTIME" title="Huấn luyện Giao Tiếp" />
      <textarea value={text} onChange={e => setText(e.target.value)}
        placeholder='Dán tin nhắn... VD: "Tôi sẽ cố hoàn thành trước thứ 6."'
        className="w-full h-20 bg-[#F8F9FB] border border-[#EAECF0] rounded-xl px-4 py-3 text-[14px] text-[#111827] resize-none focus:outline-none focus:border-[#4F46E5]/40 focus:bg-white transition-all placeholder-[#9CA3AF]" />
      {text.length > 5 && suggestion && (
        <div className="text-[13px] font-normal text-amber-700 bg-amber-50 px-4 py-3 mt-3 rounded-lg border border-amber-200">
          <strong className="font-medium">Gợi ý:</strong> {suggestion}
        </div>
      )}
      {text.length > 5 && !suggestion && (
        <div className="text-[13px] font-medium text-green-700 bg-green-50 px-4 py-3 mt-3 rounded-lg border border-green-200">
          ✓ Cách viết rõ ràng, giữ phong độ!
        </div>
      )}
    </div>
  );
}

  // Filter state
  const [search, setSearch] = useState('');
  const [filterTeam, setFilterTeam] = useState('all');
  const [filterRisk, setFilterRisk] = useState('all');
  // Leader: mặc định chỉ thấy team mình; HR: toàn tổ chức
  const [scope, setScope] = useState(user.primary_role === 'leader' ? 'mine' : 'all');

  useEffect(() => {
    if (!useRealApi) { setLiveMembers(null); setApiError(null); return; }
    let alive = true;
    setLoading(true);
    (async () => {
      try {
        const [risks, members] = await Promise.all([
          apiFetch('/retention/members', { role }),
          apiFetch('/members/', { role }).catch(() => []),
        ]);
        const userMap = new Map(members.map(m => [String(m.id), m]));
        const adapted = risks.map(r => {
          const u = userMap.get(String(r.user_id));
          return {
            id: String(r.id),
            user_id: String(r.user_id),
            risk_level: r.risk_level,
            days_in_team: 60,
            user: { name: u?.full_name || `User ${String(r.user_id).slice(0, 6)}` },
            team: { name: '—' },
            current_assignment: r.stuck_days > 0
              ? { status: 'stuck', stuck_since: new Date(Date.now() - r.stuck_days * 86400000).toISOString(), leader: { name: '—' } }
              : { status: 'none', leader: { name: '—' } },
            emotional: r.emotional_note,
          };
        });
        if (alive) { setLiveMembers(adapted); setApiError(null); }
      } catch (e) {
        if (alive) { setApiError(e.message || String(e)); setLiveMembers([]); }
      } finally {
        if (alive) setLoading(false);
      }
    })();
    return () => { alive = false; };
  }, [useRealApi, role]);

  const baseMembers = useRealApi && liveMembers ? liveMembers : MEMBERS;
  // Apply filters: scope (leader-only mock: assume team Editor), search, team, risk
  const LEADER_TEAM_NAME = 'Editor'; // mock — sau này lấy từ user.team
  const allTeams = Array.from(new Set(baseMembers.map(m => m.team?.name).filter(Boolean))).sort();
  const sourceMembers = baseMembers.filter(m => {
    if (scope === 'mine' && m.team?.name !== LEADER_TEAM_NAME) return false;
    if (filterTeam !== 'all' && m.team?.name !== filterTeam) return false;
    if (filterRisk !== 'all' && m.risk_level !== filterRisk) return false;
    if (search.trim()) {
      const q = search.toLowerCase();
      if (!(m.user?.name || '').toLowerCase().includes(q) && !(m.team?.name || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const highRiskMembers = sourceMembers.filter(m => m.risk_level === 'high' || m.risk_level === 'medium');
  const stableMembers = sourceMembers.filter(m => m.risk_level === 'low');

  const exportCSV = () => {
    const rows = [['Tên','Team','Mức rủi ro','Ngày trong team','Bế tắc (ngày)','Ghi chú']];
    sourceMembers.forEach(m => {
      const stuck = m.current_assignment?.stuck_since ? Math.floor((Date.now() - new Date(m.current_assignment.stuck_since).getTime()) / 86400000) : 0;
      rows.push([
        m.user?.name || '', m.team?.name || '', m.risk_level || '',
        String(m.days_in_team || ''), String(stuck), (m.emotional || '').replace(/"/g, '""'),
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `retention-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="p-6 lg:p-8 max-w-5xl mx-auto space-y-6 animate-fade-in">
      {/* Hero gọn — 1 dòng tagline thay 3 layer */}
      <div className="flex items-end justify-between gap-4 flex-wrap">
        <div>
          <h1 className="text-[22px] font-semibold text-[#0A0A0A] font-header tracking-tight">Radar Giữ Chân Nhân Sự</h1>
          <p className="text-[14px] text-[#525252] mt-1">Phát hiện sớm rào cản, can thiệp kịp lúc.</p>
        </div>
        {useRealApi && (
          <div className={`inline-flex items-center gap-2 text-[13px] font-medium px-2.5 py-1 rounded-md border ${apiError ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${apiError ? 'bg-red-500' : 'bg-green-500'}`}></span>
            {loading ? 'Đang tải…' : apiError ? `Lỗi API` : `${liveMembers?.length || 0} bản ghi DB`}
          </div>
        )}
      </div>

      {/* Filter bar — search / scope / team / risk / export */}
      <div className="bg-white border border-[#EAE8E0] rounded-xl p-3 flex items-center gap-2 flex-wrap">
        {/* Search */}
        <div className="relative flex-1 min-w-[200px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#9CA3AF]">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm theo tên hoặc team…"
            className="w-full bg-[#FAFAF7] border border-[#EAE8E0] rounded-lg pl-9 pr-3 py-2 text-[13px] outline-none focus:border-[#DC2626]/40 placeholder-[#9CA3AF]" />
        </div>

        {/* Leader scope toggle */}
        {user.primary_role === 'leader' && (
          <div className="flex items-center gap-1 bg-[#FAFAF7] border border-[#EAE8E0] rounded-lg p-1">
            {[['mine','Team của tôi'],['all','Toàn tổ chức']].map(([k, l]) => (
              <button key={k} onClick={() => setScope(k)}
                className={`text-[13px] px-2.5 py-1 rounded-md font-medium transition-all ${scope === k ? 'bg-white text-[#0A0A0A] shadow-sm' : 'text-[#9CA3AF] hover:text-[#525252]'}`}>{l}</button>
            ))}
          </div>
        )}

        <select value={filterTeam} onChange={e => setFilterTeam(e.target.value)} className="bg-[#FAFAF7] border border-[#EAE8E0] rounded-lg px-2.5 py-2 text-[13px] text-[#525252] outline-none">
          <option value="all">Tất cả team</option>
          {allTeams.map(t => <option key={t} value={t}>{t}</option>)}
        </select>

        <select value={filterRisk} onChange={e => setFilterRisk(e.target.value)} className="bg-[#FAFAF7] border border-[#EAE8E0] rounded-lg px-2.5 py-2 text-[13px] text-[#525252] outline-none">
          <option value="all">Mọi mức rủi ro</option>
          <option value="high">Cao</option>
          <option value="medium">Trung bình</option>
          <option value="low">Thấp</option>
          <option value="none">Ổn</option>
        </select>

        <button onClick={exportCSV} className="text-[13px] font-medium text-[#525252] hover:text-[#DC2626] inline-flex items-center gap-1.5 px-3 py-2 border border-[#EAE8E0] rounded-lg hover:bg-[#FAFAF7]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>

      {/* Cảnh báo nhanh — bỏ eyebrow uppercase + tinh gọn */}
      <div className="bg-red-50 border border-red-100 rounded-xl p-4 flex items-start gap-3">
        <div className="w-8 h-8 rounded-lg bg-[#DC2626] flex items-center justify-center flex-shrink-0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div className="flex-1">
          <h3 className="text-[14px] font-semibold text-[#7F1D1D] mb-2">Đang cần bạn lúc này</h3>
          <div className="flex flex-col gap-1.5">
            {RETENTION_DASHBOARD.recent_alerts.map((a, i) => (
              <div key={i} className="flex flex-wrap items-center gap-2 text-[13px] text-[#525252] bg-white rounded-lg px-3 py-2 border border-red-100">
                <span className="font-medium text-[#0A0A0A]">{a.member_name}</span>
                <span className="text-[#D1D5DB]">·</span>
                <span>bế tắc <strong className="font-medium num-tab text-[#DC2626]">{a.days_ago}d</strong></span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <MetricCard value={RETENTION_DASHBOARD.high_risk} label="Cần can thiệp" trend="cao" trendVariant="high" urgent />
        <MetricCard value={RETENTION_DASHBOARD.stuck_count} label="Đang bế tắc" trend="theo dõi" trendVariant="medium" urgent />
        <MetricCard value={RETENTION_DASHBOARD.checkpoints_due} label="Sắp đến hạn" trend="tuần này" trendVariant="info" />
        <MetricCard value={RETENTION_DASHBOARD.total_members} label="Thành viên" trend="ổn định" trendVariant="ok" />
      </div>

      {/* Risk list — visual avatar grid thay vì text list */}
      <div className="bg-white border border-[#EAE8E0] rounded-xl shadow-card overflow-hidden">
        <div className="px-6 py-4 border-b border-[#EAE8E0]">
          <h2 className="text-[16px] font-semibold text-[#0A0A0A] font-header">Ưu tiên xử lý <span className="text-[#9CA3AF] font-normal num-tab">· {highRiskMembers.length}</span></h2>
        </div>
        {highRiskMembers.length === 0 ? (
          <div className="p-10 flex flex-col items-center justify-center text-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#EAE8E0" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-4"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            <p className="text-[14px] font-medium text-[#525252]">An toàn</p>
            <p className="text-[13px] text-[#9CA3AF] mt-1">Không có nhân sự nào cần can thiệp khẩn cấp.</p>
          </div>
        ) : (
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 p-6 bg-[#FAFAF7]">
            {highRiskMembers.map(m => <HaloAvatarCard key={m.id} member={m} onIntervene={() => setInterventionMember(m)} />)}
          </div>
        )}
      </div>

      {/* Stable list — visual avatar grid */}
      <div className="bg-white border border-[#EAE8E0] rounded-xl shadow-card overflow-hidden">
        <div className="px-6 py-4 border-b border-[#EAE8E0]">
          <h2 className="text-[16px] font-semibold text-[#0A0A0A] font-header">Đang hòa nhập tốt <span className="text-[#9CA3AF] font-normal num-tab">· {stableMembers.length}</span></h2>
        </div>
        {stableMembers.length === 0 ? (
          <div className="p-10 flex flex-col items-center justify-center text-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#EAE8E0" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-4"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            <p className="text-[14px] font-medium text-[#525252]">Chưa có dữ liệu</p>
          </div>
        ) : (
          <div className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-4 p-6 bg-[#FAFAF7]">
            {stableMembers.map(m => <StableAvatarCard key={m.id} member={m} />)}
          </div>
        )}
      </div>

      {user.primary_role === 'hr_manager' && (
        <div className="bg-white border border-[#EAE8E0] rounded-xl shadow-card overflow-hidden">
          <div className="px-6 py-4 border-b border-[#EAE8E0]">
            <h2 className="text-[16px] font-semibold text-[#0A0A0A] font-header">Phân tích Leader</h2>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-6">
            {LEADER_METRICS.map(lm => (<LeaderCard key={lm.id} lm={lm} onWarn={() => setWarnLeader(lm)} onCoach={() => setCoachLeader(lm)} />))}
          </div>
        </div>
      )}

      {interventionMember && <InterventionModal member={interventionMember} onClose={() => setInterventionMember(null)} />}
      {warnLeader && (
        <Modal open onClose={() => setWarnLeader(null)} title="Nhắc nhở nhẹ" size="sm">
          <div className="p-6 text-center">
            <p className="text-[14px] text-[#4B5563] mb-5">Xác nhận gửi thông báo nhắc nhở 1-on-1 cho <br /><strong className="text-[#111827] font-medium">{warnLeader.leader.name}</strong>?</p>
            <button onClick={() => setWarnLeader(null)} className="w-full py-3 bg-[#D97706] text-white font-medium text-[14px] rounded-xl hover:bg-[#b45309]">Đã gửi nhắc nhở</button>
          </div>
        </Modal>
      )}
      {coachLeader && (
        <Modal open onClose={() => setCoachLeader(null)} title="Yêu cầu Coaching" size="sm">
          <div className="p-6 text-center">
            <p className="text-[14px] text-[#4B5563] mb-5">Team của <strong className="text-[#111827] font-medium">{coachLeader.leader.name}</strong> đang có tỷ lệ nghỉ việc cao. Tạo request Coaching?</p>
            <button onClick={() => setCoachLeader(null)} className="w-full py-3 bg-[#4F46E5] text-white font-medium text-[14px] rounded-xl hover:bg-[#4338ca]">Tạo lịch hẹn</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function HaloAvatarCard({ member, onIntervene }) {
  const stuckDays = member.current_assignment?.stuck_since ? Math.floor((Date.now() - new Date(member.current_assignment.stuck_since).getTime()) / 86400000) : 0;
  const isHigh = member.risk_level === 'high';
  const ringColor = isHigh ? 'rgba(220, 38, 38, 0.4)' : 'rgba(217, 119, 6, 0.4)';
  const solidColor = isHigh ? '#DC2626' : '#D97706';
  
  return (
    <div className="group relative flex flex-col items-center p-5 bg-white border border-[#EAECF0] rounded-2xl hover:shadow-card-hover transition-all cursor-pointer" onClick={onIntervene}>
      <div className="relative mb-4">
        <div className="absolute -inset-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-pulse" style={{ backgroundColor: ringColor }}></div>
        <div className="relative w-16 h-16 rounded-full flex items-center justify-center text-white text-[20px] font-medium font-header shadow-sm" style={{ backgroundColor: solidColor }}>
          {member.user.name.charAt(0)}
        </div>
        <div className="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white" style={{ backgroundColor: isHigh ? '#DC2626' : '#F59E0B' }}></div>
      </div>
      <h3 className="text-[14px] font-semibold text-[#111827] font-header text-center leading-tight">{member.user.name}</h3>
      <p className="text-[13px] text-[#9CA3AF] mt-1 text-center">{member.team.name}</p>
      
      <div className="mt-3 w-full bg-[#F8F9FB] rounded-lg py-2 flex justify-center items-center gap-3">
        <div className="flex items-center gap-1.5">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span className="text-[13px] font-medium num-tab text-[#525252]">{stuckDays}d</span>
        </div>
        <div className="w-px h-3 bg-[#EAE8E0]"></div>
        <div className="flex items-center gap-1.5">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span className="text-[13px] font-medium num-tab text-[#525252]">{member.days_in_team}/90</span>
        </div>
      </div>
    </div>
  );
}

function StableAvatarCard({ member }) {
  return (
    <div className="flex flex-col items-center p-4 bg-white border border-[#EAECF0] rounded-2xl hover:bg-[#FAFAF7] transition-all">
      <div className="w-12 h-12 rounded-full flex items-center justify-center text-[#059669] bg-green-50 text-[16px] font-medium font-header border border-green-100 mb-3">
        {member.user.name.charAt(0)}
      </div>
      <h3 className="text-[14px] font-semibold text-[#111827] font-header text-center leading-tight truncate w-full">{member.user.name}</h3>
      <p className="text-[13px] text-[#9CA3AF] mt-0.5 text-center truncate w-full">{member.team.name}</p>
    </div>
  );
}

function LeaderCard({ lm, onWarn, onCoach }) {
  const turnoverHigh = (lm.turnover_rate_3m ?? 0) > 20;
  return (
    <div className="bg-[#F8F9FB] rounded-xl p-5 text-center">
      <div className="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-[#4F46E5] font-semibold text-base mx-auto mb-3 border border-indigo-200">{lm.leader.name.charAt(0)}</div>
      <h3 className="text-[14px] font-semibold text-[#111827] font-header">{lm.leader.name}</h3>
      <p className="text-[13px] text-[#9CA3AF] uppercase tracking-[0.06em] mt-0.5">{lm.team.name} · <span className="num-tab">{lm.team_size}</span> người</p>
      <div className="mt-3 flex gap-2 justify-center flex-wrap">
        <Badge variant={turnoverHigh ? 'high' : 'neutral'}>Rời đi: <span className="num-tab ml-1">{lm.turnover_rate_3m}%</span></Badge>
        <Badge variant="info">Năng lượng: <span className="num-tab ml-1">{lm.engage_score}/10</span></Badge>
      </div>
      <div className="mt-4 grid grid-cols-2 gap-2">
        <button onClick={onWarn} className="flex items-center justify-center gap-1.5 py-2 border border-amber-200 bg-amber-50 text-amber-700 font-medium text-[13px] rounded-lg hover:bg-amber-100 transition-colors">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Nhắc nhở
        </button>
        <button onClick={onCoach} className="flex items-center justify-center gap-1.5 py-2 bg-[#4F46E5] text-white font-medium text-[13px] rounded-lg hover:bg-[#4338ca] transition-colors">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          Huấn luyện
        </button>
      </div>
    </div>
  );
}

function InterventionModal({ member, onClose }) {
  const [step, setStep] = useState('info');
  const stuckDays = member.current_assignment?.stuck_since ? Math.floor((Date.now() - new Date(member.current_assignment.stuck_since).getTime()) / 86400000) : 0;
  return (
    <Modal open onClose={onClose} title="Can Thiệp" size="md">
      {step === 'info' ? (
        <div className="p-6 space-y-5">
          <div className="flex items-center gap-4">
            <div className="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center text-[#DC2626] font-semibold text-lg border border-red-100 shadow-sm">{member.user.name.charAt(0)}</div>
            <div>
              <h2 className="text-[18px] font-semibold text-[#111827] font-header tracking-tight">{member.user.name}</h2>
              <p className="text-[14px] text-[#525252] mt-0.5">{member.team.name} · Bế tắc <strong className="text-[#DC2626] font-medium num-tab">{stuckDays} ngày</strong></p>
            </div>
          </div>
          <div className="bg-[#FAFAF7] border border-[#EAE8E0] rounded-xl p-4 relative overflow-hidden">
            <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#DC2626]"></div>
            <p className="text-[14px] text-[#4B5563] leading-relaxed ml-2 font-medium">"{member.emotional || "Thiếu gắn kết và có dấu hiệu giảm hiệu suất."}"</p>
          </div>
          <div className="space-y-3">
            <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.1em]">Đề xuất tiếp cận (AI Gợi ý)</p>
            <button onClick={() => setStep('done')} className="w-full text-left p-4 rounded-xl border border-[#EAECF0] bg-white hover:border-[#4F46E5] hover:shadow-sm transition-all group">
              <div className="flex items-center gap-3 mb-1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <p className="text-[14px] font-medium text-[#111827] group-hover:text-[#4F46E5] transition-colors">Trò chuyện nhẹ nhàng</p>
              </div>
              <p className="text-[13px] text-[#525252] pl-7">Bắt chuyện, không tạo áp lực về công việc.</p>
            </button>
            <button onClick={() => setStep('done')} className="w-full text-left p-4 rounded-xl border border-[#EAECF0] bg-white hover:border-[#D97706] hover:shadow-sm transition-all group">
              <div className="flex items-center gap-3 mb-1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D97706" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

function parseHighlights(text) {
  const all = [
    ...SILENCE_PATTERNS.map(t => ({ term: t, cls: 'hl-silence' })),
    ...VAGUE_PATTERNS.map(t => ({ term: t, cls: 'hl-vague' })),
    ...DIRECT_PATTERNS.map(t => ({ term: t, cls: 'hl-direct' })),
    ...FACE_PATTERNS.map(t => ({ term: t, cls: 'hl-face' })),
  ];
  const lo = text.toLowerCase();
  const ranges = [];
  all.forEach(it => {
    let i = lo.indexOf(it.term);
    while (i !== -1) { ranges.push({ start: i, end: i + it.term.length, cls: it.cls }); i = lo.indexOf(it.term, i + it.term.length); }
  });
  ranges.sort((a, b) => a.start - b.start || b.end - a.end);
  const merged = [];
  ranges.forEach(r => { const last = merged[merged.length - 1]; if (!last || r.start >= last.end) merged.push(r); });
  const segs = []; let cur = 0;
  merged.forEach(r => { if (r.start > cur) segs.push({ text: text.slice(cur, r.start) }); segs.push({ text: text.slice(r.start, r.end), cls: r.cls }); cur = r.end; });
  if (cur < text.length) segs.push({ text: text.slice(cur) });
  return segs;
}

function computeScore(text) {
  if (!text || text.trim().length < 3) return null;
  let s = 50;
  const sil = text.match(/không sao|bình thường|ok em|dạ được|chờ xem|thôi bỏ qua|để tính|có lẽ/gi) || [];
  const vag = text.match(/cố gắng|sẽ làm|hy vọng|mong là|có thể|thử xem|cố thôi/gi) || [];
  const dir = text.match(/không đồng ý|cụ thể là|cần|thời hạn|vì lý do|giải pháp|chốt|đề xuất/gi) || [];
  s -= sil.length * 15; s -= vag.length * 10; s += dir.length * 20;
  if (/\d{1,2}[:h]\d{0,2}/i.test(text)) s += 15;
  return Math.max(0, Math.min(100, s));
}

function buildRewrite(text) {
  let r = text.trim();
  const rules = { 'sẽ cố gắng hoàn thành': 'sẽ hoàn thành và gửi lúc 17:00 hôm nay', 'có lẽ ok': 'được, tôi xác nhận', 'không sao': 'Tôi thấy có điểm chưa hợp lý tại...', 'sẽ cố': 'Tôi cam kết hoàn thành vào [Thứ/Giờ]', 'hy vọng': 'Tôi cam kết', 'bình thường': 'Thực tế tôi mong đợi' };
  const lo = r.toLowerCase();
  Object.entries(rules).forEach(([k, v]) => { if (lo.includes(k)) r = r.replace(new RegExp(k, 'gi'), v); });
  if (!/\b\d{1,2}[:h]\d{0,2}/i.test(r)) r += ' Tôi sẽ phản hồi mốc tiếp theo lúc 16:00 hôm nay.';
  if (!/tôi\s+sẽ|tôi\s+không\s+thể|tôi\s+cần/i.test(r)) r = `Tôi cần làm rõ như sau: ${r}`;
  return r;
}

/** Tô màu text dựa trên list highlight phrases từ AI (mỗi item có phrase + type). */
function highlightWithAI(text, items) {
  if (!items || items.length === 0) return [{ text }];
  const TYPE_TO_CLASS = { silence: 'hl-silence', vague: 'hl-vague', direct: 'hl-direct', face: 'hl-face' };
  const lo = text.toLowerCase();
  const ranges = [];
  items.forEach(it => {
    if (!it.phrase) return;
    const term = String(it.phrase).toLowerCase();
    let i = lo.indexOf(term);
    while (i !== -1) {
      ranges.push({ start: i, end: i + term.length, cls: TYPE_TO_CLASS[it.type] || 'hl-vague' });
      i = lo.indexOf(term, i + term.length);
    }
  });
  ranges.sort((a, b) => a.start - b.start || b.end - a.end);
  const merged = [];
  ranges.forEach(r => { const last = merged[merged.length - 1]; if (!last || r.start >= last.end) merged.push(r); });
  const segs = []; let cur = 0;
  merged.forEach(r => { if (r.start > cur) segs.push({ text: text.slice(cur, r.start) }); segs.push({ text: text.slice(r.start, r.end), cls: r.cls }); cur = r.end; });
  if (cur < text.length) segs.push({ text: text.slice(cur) });
  return segs;
}

function TrainingSlides({ onClose }) {
  const [slide, setSlide] = useState(0);
  const [countdown, setCountdown] = useState(5);
  const isLast = slide === TRAINING_SLIDES.length - 1;
  const canClose = !isLast || countdown === 0;

  useEffect(() => { if (!isLast || countdown === 0) return; const t = setTimeout(() => setCountdown(c => c - 1), 1000); return () => clearTimeout(t); }, [isLast, countdown]);
  useEffect(() => { if (slide !== TRAINING_SLIDES.length - 1) setCountdown(5); }, [slide]);

  const cur = TRAINING_SLIDES[slide];
  return (
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4" style={{ background: 'rgba(17,24,39,0.95)' }}>
      <div className="w-full max-w-lg animate-slide-up">
        <div className="flex items-center justify-center gap-2 mb-6">
          {TRAINING_SLIDES.map((_, i) => (
            <button key={i} onClick={() => setSlide(i)} className={`transition-all duration-300 rounded-full ${i === slide ? 'w-8 h-2.5 bg-[#059669]' : 'w-2.5 h-2.5 bg-white/20 hover:bg-white/40'}`}></button>
          ))}
        </div>
        <div className="bg-[#1E293B] rounded-2xl p-8 border border-white/10 shadow-modal">
          <p className="text-[11px] font-medium text-white/40 uppercase tracking-[0.12em] mb-3">{cur.sub}</p>
          <h2 className="text-[24px] font-semibold text-white font-header leading-tight mb-4">{cur.title}</h2>
          <p className="text-[14px] text-white/70 leading-relaxed">{cur.body}</p>
        </div>
        <div className="flex items-center justify-between mt-6">
          <button onClick={() => setSlide(Math.max(0, slide - 1))} disabled={slide === 0} className="px-4 py-2.5 text-[13px] font-medium text-white/50 hover:text-white/80 disabled:opacity-30">Quay lại</button>
          {isLast ? (
            <button onClick={onClose} disabled={!canClose} className={`px-6 py-3 rounded-xl text-[14px] font-medium transition-all ${canClose ? 'bg-[#059669] text-white hover:bg-[#047857]' : 'bg-white/10 text-white/40 cursor-not-allowed'}`}>

            </button>
          ) : (
            <button onClick={() => setSlide(slide + 1)} className="px-6 py-3 bg-white/10 hover:bg-white/20 text-white text-[14px] font-medium rounded-xl">Tiếp theo</button>

      </div>
    </div>
  );

/* CULTURE */
const CULTURE_TABS = [
  { key: 'home',       label: 'Bảng Tin' },
  { key: 'challenges', label: 'Thử Thách' },
  { key: 'knowledge',  label: 'Kho Bài Học' },
  { key: 'journey',    label: 'Hành Trình' },
  { key: 'health',     label: 'Sức Khỏe Đội Ngũ', roles: ['hr_manager'] },
];

function CulturePage({ user, useRealApi = false, role = 'hr_manager' }) {
  const visible = CULTURE_TABS.filter(t => !t.roles || t.roles.includes(user.primary_role));
  const [tab, setTab] = useState('home');
  const [showShare, setShowShare] = useState(false);
  const [liveStories, setLiveStories] = useState(null);
  const [storiesError, setStoriesError] = useState(null);
  const [userStories, setUserStories] = useState([]);
  useEffect(() => { if (!visible.find(t => t.key === tab)) setTab('home'); }, [user.primary_role]);

  const refetchStories = React.useCallback(() => {
    if (!useRealApi) return;
    apiFetch('/culture/stories', { role })
      .then(rows => {
        const adapted = rows.map(s => ({
          id: s.id,
          content: s.content,
          experience_type: s.experience_type || 'directness',
          courage_level: s.courage_level || 'medium',
          user: { name: s.is_anonymous ? 'NhiLe Team Member' : (s.user_name || 'NhiLe Team Member') },
          team: { name: '—' },
          is_anonymous: !!s.is_anonymous,
          created_at: s.created_at || new Date().toISOString(),
          reactions: s.reactions || { brave: 0, respect: 0, learn: 0 },
          is_public: true,
        }));
        setLiveStories(adapted);
      })
      .catch(e => setStoriesError(e.message));
  }, [useRealApi, role]);

  const handleStoryAdded = (story) => {
    console.log('[ShareStory] Đã thêm story local:', story);
    setUserStories(prev => [story, ...prev]);
    setTab('home'); // chuyển về Bảng tin để user thấy ngay
    if (useRealApi) {
      apiFetch('/culture/stories', {
        role,
        method: 'POST',
        body: {
          content: story.content,
          experience_type: story.experience_type,
          courage_level: story.courage_level,
          support_level: story.support_level,
          is_public: story.is_public,
          is_anonymous: !!story.is_anonymous,
        },
      })
        .then(saved => {
          console.log('[ShareStory] Đã lưu vào DB:', saved);
          // Sau khi lưu thành công, refetch để story xuất hiện trong liveStories
          // và xoá khỏi userStories tạm để tránh trùng
          setUserStories(prev => prev.filter(s => s.id !== story.id));
          refetchStories();
        })
        .catch(e => {
          console.warn('[ShareStory] Lưu DB thất bại — story chỉ giữ ở local:', e.message);
        });
    }
  };

  useEffect(() => {
    if (!useRealApi) { setLiveStories(null); setStoriesError(null); return; }
    let alive = true;
    apiFetch('/culture/stories', { role })
      .then(rows => {
        const adapted = rows.map(s => ({
          id: s.id,
          content: s.content,
          experience_type: s.experience_type || 'directness',
          courage_level: s.courage_level || 'medium',
          user: { name: s.is_anonymous ? 'NhiLe Team Member' : (s.user_name || 'NhiLe Team Member') },
          team: { name: '—' },
          is_anonymous: !!s.is_anonymous,
          created_at: s.created_at || new Date().toISOString(),
          reactions: s.reactions || { brave: 0, respect: 0, learn: 0 },
        }));
        if (alive) { setLiveStories(adapted); setStoriesError(null); }
      })
      .catch(e => { if (alive) { setStoriesError(e.message); setLiveStories([]); } });
    return () => { alive = false; };
  }, [useRealApi, role]);

  return (
    <div className="p-6 lg:p-8 max-w-5xl mx-auto space-y-6">
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <p className="text-[11px] font-medium text-[#9CA3AF] uppercase tracking-[0.1em] mb-1.5">Không Gian Chung</p>
          <h1 className="text-[24px] font-semibold text-[#111827] font-header tracking-tight">Nhịp Đập Văn Hóa</h1>
          <p className="text-[14px] text-[#4B5563] mt-1.5 max-w-xl">Lan tỏa tinh thần Dám Sai - Nói Thẳng. Hành động nhỏ tạo nên văn hóa lớn.</p>
        </div>
        <button onClick={() => setShowShare(true)} className="w-full md:w-auto px-5 py-2.5 bg-[#C0392B] text-white font-medium text-[14px] rounded-lg hover:bg-[#a8331f] active:scale-[0.97]">+ Kể câu chuyện</button>
      </div>
      <div className="flex gap-1 flex-wrap bg-white p-1 rounded-xl border border-[#EAECF0] w-max shadow-card">
        {visible.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={`px-4 py-2 rounded-lg text-[14px] font-medium transition-all ${tab === t.key ? 'bg-[#111827] text-white' : 'text-[#4B5563] hover:text-[#111827] hover:bg-[#F8F9FB]'}`}>
            {t.label}

        ))}
      </div>
      {useRealApi && (
        <div className={`inline-flex items-center gap-2 text-[13px] font-medium px-2.5 py-1 rounded-md border ${storiesError ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${storiesError ? 'bg-red-500' : 'bg-green-500'}`}></span>
          {storiesError ? `Lỗi API: ${storiesError}` : `Live · ${liveStories?.length || 0} stories từ DB`}
        </div>
      )}
      <div className="animate-fade-in" key={tab}>
        {tab === 'home' && <HomeFeed user={user} stories={useRealApi && liveStories != null ? liveStories : null} extraStories={userStories} onShare={() => setShowShare(true)} />}

      </div>
      {showShare && <ShareStoryModal user={user} onSubmitted={handleStoryAdded} onClose={() => setShowShare(false)} />}
    </div>
  );
}

function StoryCard({ story }) {
  const [reacted, setReacted] = useState(null);
  const [counts, setCounts] = useState({
    brave: story.reactions?.brave || 0,
    respect: story.reactions?.respect || 0,
    learn: story.reactions?.learn || 0,
  });
  const onReact = (k) => {
    setCounts(prev => {
      const next = { ...prev };
      if (reacted === k) { next[k] = Math.max(0, (prev[k] || 0) - 1); }
      else {
        if (reacted) next[reacted] = Math.max(0, (prev[reacted] || 0) - 1);
        next[k] = (prev[k] || 0) + 1;
      }
      return next;
    });
    setReacted(reacted === k ? null : k);
  };
  const isBreak = story.courage_level === 'breakthrough';
  
  // Pattern cover SVG by experience type
  let coverSvg = '';
  if (story.experience_type === 'directness') coverSvg = '<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="p1" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#4F46E5" fill-opacity="0.2"/></pattern></defs><rect width="100%" height="100%" fill="url(#p1)"/></svg>';
  else if (story.experience_type === 'feedback') coverSvg = '<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="p2" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M0 20L20 0ZM20 20L0 0Z" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.3" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(#p2)"/></svg>';
  else coverSvg = '<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="p3" width="10" height="10" patternUnits="userSpaceOnUse"><line x1="0" y1="10" x2="10" y2="0" stroke="#059669" stroke-width="1" stroke-opacity="0.2"/></pattern></defs><rect width="100%" height="100%" fill="url(#p3)"/></svg>';

  const icons = {
    brave: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
    respect: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>,
    learn: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
  };

  return (
    <div className="bg-white rounded-2xl border border-[#EAECF0] shadow-card overflow-hidden hover:shadow-card-hover transition-all group">
      <div className="h-12 w-full bg-[#F8F9FB] relative" dangerouslySetInnerHTML={{ __html: coverSvg }}></div>
      <div className="px-5 pb-5 pt-3">
        {isBreak && (
          <div className="inline-flex items-center gap-2 mb-3"><Badge variant="medium">Dám Sai — Đột Phá</Badge></div>
        )}
        <div className="flex items-center gap-3 mb-4 mt-1">
          <div className="w-10 h-10 bg-white text-[#111827] rounded-full flex items-center justify-center font-medium text-sm border border-[#EAE8E0] shadow-sm -mt-6 z-10 relative">{story.user.name.charAt(0)}</div>
          <div className="flex-1 min-w-0">
            <p className="text-[14px] font-semibold text-[#111827]">{story.user.name}</p>
            <p className="text-[13px] text-[#9CA3AF]">{story.team.name} · {new Date(story.created_at).toLocaleDateString('vi-VN')}</p>
          </div>
          <Badge variant="neutral">{EXP_LABELS[story.experience_type]}</Badge>
        </div>
        <p className="text-[13.5px] text-[#4B5563] leading-relaxed mb-4">"{story.content}"</p>
        <div className="flex gap-2 border-t border-[#EAECF0] pt-4 flex-wrap">
          {[['brave','Dám làm'],['respect','Tôn trọng'],['learn','Học được']].map(([k, l]) => (
            <button key={k} onClick={() => onReact(k)}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[13px] font-medium transition-transform active:scale-95 border ${reacted === k ? 'bg-[#111827] text-white border-[#111827]' : 'bg-[#FAFAF7] text-[#525252] border-[#EAE8E0] hover:bg-[#F4F5F8]'}`}>
              {icons[k]} {l} <span className={`num-tab ml-1 ${reacted === k ? 'text-white/80' : 'text-[#9CA3AF]'}`}>{counts[k] || 0}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
